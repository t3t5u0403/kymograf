name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # electron-builder creates the draft release + uploads assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # on a v* tag this uploads installers to a draft GitHub release;
      # manual runs just build and attach artifacts
      - run: npx electron-builder --publish onTagOrDraft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: kymograf-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.exe
            release/*.dmg
          if-no-files-found: ignore
